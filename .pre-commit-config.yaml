repos:
  - repo: local
    hooks:
      # ── Python ────────────────────────────────────────────────────────────
      - id: ruff-format
        name: ruff format
        entry: .venv/bin/ruff format
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-check
        name: ruff check
        entry: .venv/bin/ruff check --fix
        language: system
        types: [python]
        pass_filenames: false

      - id: ty-check
        name: ty check
        entry: .venv/bin/ty check
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest (with coverage)
        entry: .venv/bin/pytest --cov=make_ics --cov-fail-under=90
        language: system
        types: [python]
        pass_filenames: false

      # ── Go ────────────────────────────────────────────────────────────────
      - id: go-build
        name: go build
        entry: go build ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-test
        name: go test
        entry: go test ./...
        language: system
        types: [go]
        pass_filenames: false
